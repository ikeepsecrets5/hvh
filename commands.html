{% extends "base.html" %}
{% block title %}Comandos{% endblock %}
{% block content %}
<section class="command-grid">
    {% for command in commands %}
        <article class="command-card">
            <span>{{ command.group }}</span>
            <strong>{{ command.name }}</strong>
            <p>{{ command.desc }}</p>
        </article>
    {% endfor %}
</section>
{% endblock %}
